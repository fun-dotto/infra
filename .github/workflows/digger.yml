name: Digger

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/google/**"
      - "digger.yml"
    types:
      - closed
      - opened
      - ready_for_review
      - reopened
      - synchronize
  issue_comment:
    types:
      - created
  workflow_dispatch:

concurrency:
  group: digger-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  id-token: write
  issues: read
  pull-requests: write
  statuses: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  WORKLOAD_IDENTITY_PROVIDER: "projects/107577467292/locations/global/workloadIdentityPools/dotto/providers/github"
  SERVICE_ACCOUNT: "terraform-ci@swift2023groupc.iam.gserviceaccount.com"
  DIGGER_LOCK_BUCKET: "swift2023groupc-tfstate"

jobs:
  digger:
    name: Digger
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, 'digger')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify PR satisfies branch rules before apply
        if: >-
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, 'digger apply')
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          merge_state="$(gh pr view "$PR_NUMBER" --json mergeStateStatus --jq '.mergeStateStatus')"

          if [[ "$merge_state" != "CLEAN" ]]; then
            echo "::error::PR does not satisfy branch rules: $merge_state"
            exit 1
          fi

      - name: Run Digger
        uses: diggerhq/digger@6baf84cd9cd7c6522b98504f4a2258474d6c2de3 # v0.6.147
        with:
          cache-dependencies: true
          digger-version: v0.6.147
          google-lock-bucket: ${{ env.DIGGER_LOCK_BUCKET }}
          google-service-account: ${{ env.SERVICE_ACCOUNT }}
          google-workload-identity-provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          no-backend: true
          post-plans-as-one-comment: true
          reporting-strategy: latest_run_comment
          setup-google-cloud: true
          setup-terraform: true
          terraform-version: 1.15.5
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
          GITHUB_TOKEN: ${{ github.token }}
          LOCK_PROVIDER: gcp
