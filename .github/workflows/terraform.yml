name: Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/google/**"
      - "digger.yml"
    types:
      - closed
      - opened
      - ready_for_review
      - reopened
      - synchronize
  issue_comment:
    types:
      - created
  workflow_dispatch:

concurrency:
  group: digger-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read
  id-token: write
  issues: read
  pull-requests: write
  statuses: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  WORKLOAD_IDENTITY_PROVIDER: "projects/107577467292/locations/global/workloadIdentityPools/dotto/providers/github"
  SERVICE_ACCOUNT: "terraform-ci@swift2023groupc.iam.gserviceaccount.com"
  DIGGER_LOCK_BUCKET: "swift2023groupc-tfstate"

jobs:
  fmt:
    name: Format
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          github_token: ${{ github.token }}
          cache: true
      - name: terraform fmt -check
        run: terraform fmt -check -recursive terraform

  digger:
    name: Digger
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, 'digger')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Digger
        uses: diggerhq/digger@6baf84cd9cd7c6522b98504f4a2258474d6c2de3 # v0.6.147
        with:
          cache-dependencies: true
          google-lock-bucket: ${{ env.DIGGER_LOCK_BUCKET }}
          google-service-account: ${{ env.SERVICE_ACCOUNT }}
          google-workload-identity-provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          no-backend: true
          setup-google-cloud: true
          setup-terraform: true
          terraform-version: 1.15.5
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
          GITHUB_TOKEN: ${{ github.token }}
