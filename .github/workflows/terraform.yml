name: Terraform

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: "0 15 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  WORKLOAD_IDENTITY_PROVIDER: "projects/107577467292/locations/global/workloadIdentityPools/dotto/providers/github"
  SERVICE_ACCOUNT: "terraform-ci@swift2023groupc.iam.gserviceaccount.com"

jobs:
  fmt:
    name: Format
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ github.token }}
          cache: true
      - name: terraform fmt -check
        run: terraform fmt -check -recursive terraform

  plan:
    name: plan (${{ matrix.dir }})
    # TODO: 手順を見直す
    if: false
    # if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        dir:
          - google/modules/project
          - google/modules/cloud-storage
          - google/modules/cloud-sql
          - google/modules/iam-workload-identity
          - google/modules/artifact-registry
          - google/modules/secret-manager
          - google/modules/firebase-remote-config
    defaults:
      run:
        working-directory: terraform/${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ github.token }}
          cache: true

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: terraform init
        run: terraform init -input=false

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        run: terraform plan -input=false -no-color

      - name: Summarize plan
        if: always()
        run: |
          {
            echo "### Terraform Plan — \`${{ matrix.dir }}\` (\`${{ steps.plan.outcome }}\`)"
            echo '```'
            echo "${{ steps.plan.outputs.stdout }}" | tail -c 60000
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: apply
    # TODO: 手順を見直す
    if: false
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: fmt
    # 本番への apply。必須: GitHub の Settings → Environments → production に
    # "Required reviewers" を設定し、apply 前に手動承認を強制すること。
    environment: production
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ github.token }}
          cache: true

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      # 依存関係に沿って直列に apply する。
      - name: terraform apply (ordered)
        run: |
          set -euo pipefail
          DIRS=(
            project
            cloud-storage
            artifact-registry
            iam-service-account
            iam-workload-identity
            secret-manager
            cloud-sql
            cloud-run-job
            cloud-run-service
            firebase-remote-config
          )
          for dir in "${DIRS[@]}"; do
            echo "::group::apply ${dir}"
            terraform -chdir="terraform/google/modules/${dir}" init -input=false
            terraform -chdir="terraform/google/modules/${dir}" apply -input=false -auto-approve -no-color
            echo "::endgroup::"
          done
