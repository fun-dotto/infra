name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

# 同一ブランチの古い実行はキャンセル。main の apply は直列化する。
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.15.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  WORKLOAD_IDENTITY_PROVIDER: "projects/107577467292/locations/global/workloadIdentityPools/dotto/providers/github"
  SERVICE_ACCOUNT: "terraform-ci@swift2023groupc.iam.gserviceaccount.com"
  # google_cloud_project_id / google_cloud_region は
  # terraform/google/_shared/variables.shared.tf の default で供給するため env 不要。
  # project ディレクトリ専用の変数。
  TF_VAR_google_cloud_project_name: ${{ vars.GOOGLE_CLOUD_PROJECT_NAME }}
  TF_VAR_google_cloud_billing_account: ${{ secrets.GOOGLE_CLOUD_BILLING_ACCOUNT }}

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform fmt -check
        run: terraform fmt -check -recursive terraform

  plan:
    name: plan (${{ matrix.dir }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        dir:
          - project
          - cloud-storage
          - artifact-registry
          - iam-service-account
          - iam-workload-identity
          - secret-manager
          - cloud-sql
          - cloud-run-job
          - cloud-run-service
          - firebase-remote-config
    defaults:
      run:
        working-directory: terraform/google/modules/${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # gitignore された sensitive な tfvars を Secret から復元する。
      - name: Materialize cloud-run-service tfvars
        if: matrix.dir == 'cloud-run-service' && env.TFVARS != ''
        env:
          TFVARS: ${{ secrets.TFVARS_CLOUD_RUN_SERVICE }}
        run: printf '%s' "$TFVARS" > terraform.tfvars

      - name: terraform init
        run: terraform init -input=false

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        run: terraform plan -input=false -no-color

      - name: Summarize plan
        if: always()
        run: |
          {
            echo "### Terraform Plan — \`${{ matrix.dir }}\` (\`${{ steps.plan.outcome }}\`)"
            echo '```'
            echo "${{ steps.plan.outputs.stdout }}" | tail -c 60000
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: fmt
    # 本番への apply。必須: GitHub の Settings → Environments → production に
    # "Required reviewers" を設定し、apply 前に手動承認を強制すること。
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Materialize cloud-run-service tfvars
        if: env.TFVARS != ''
        env:
          TFVARS: ${{ secrets.TFVARS_CLOUD_RUN_SERVICE }}
        run: printf '%s' "$TFVARS" > terraform/google/modules/cloud-run-service/terraform.tfvars

      # 依存関係に沿って直列に apply する。
      # project → storage → registry → IAM → secrets → sql → jobs → services
      - name: terraform apply (ordered)
        run: |
          set -euo pipefail
          DIRS=(
            project
            cloud-storage
            artifact-registry
            iam-service-account
            iam-workload-identity
            secret-manager
            cloud-sql
            cloud-run-job
            cloud-run-service
            firebase-remote-config
          )
          for dir in "${DIRS[@]}"; do
            echo "::group::apply ${dir}"
            terraform -chdir="terraform/google/modules/${dir}" init -input=false
            terraform -chdir="terraform/google/modules/${dir}" apply -input=false -auto-approve -no-color
            echo "::endgroup::"
          done
